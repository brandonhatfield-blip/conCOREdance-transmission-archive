name: Transmission Canonizer

on:
  issues:
    types:
      - labeled
      - closed

permissions:
  contents: write
  issues: write

concurrency:
  group: transmission-canonizer-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  canonize:
    name: Canonize approved issue as Markdown
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request }}

    steps:
      - name: Check canonization labels
        id: preflight
        uses: actions/github-script@v7
        with:
          script: |
            const canonical = new Set(['canonize', 'approved', 'active canon']);
            const blockers = new Set(['canonized', 'do-not-canonize', 'needs-revision']);
            const labels = (context.payload.issue.labels || [])
              .map((label) => String(label.name || '').trim().toLowerCase())
              .filter(Boolean);

            const hasBlocker = labels.some((label) => blockers.has(label));
            const hasApproval = labels.some((label) => canonical.has(label));
            const action = context.payload.action;
            const eventLabel = String((context.payload.label || {}).name || '').trim().toLowerCase();

            const shouldRun = !hasBlocker && (
              (action === 'labeled' && canonical.has(eventLabel)) ||
              (action === 'closed' && hasApproval)
            );

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.info(shouldRun
              ? 'Issue is approved for canonization.'
              : 'Issue is not in a canonization state; skipping archive write.');

      - name: Check out archive
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Write canonical Markdown file
        if: steps.preflight.outputs.should_run == 'true'
        id: canonize
        run: python scripts/canonize_transmission_issue.py --issue-event "$GITHUB_EVENT_PATH" --output-json /tmp/canonized-transmission.json

      - name: Render public archive page
        if: steps.preflight.outputs.should_run == 'true'
        id: publish
        run: python scripts/publish_transmission.py --issue-event "$GITHUB_EVENT_PATH" --output-json /tmp/published-transmission.json

      - name: Commit canonical Markdown and public archive update
        if: steps.preflight.outputs.should_run == 'true'
        id: commit
        run: |
          git config user.name "ConCOREdance Transmission Canonizer"
          git config user.email "actions@github.com"
          git add transmissions archive CANON.md
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Canonize and publish transmission ${{ steps.canonize.outputs.transmission_id }}"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark issue as canonized
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const canonized = JSON.parse(fs.readFileSync('/tmp/canonized-transmission.json', 'utf8'));
            const published = JSON.parse(fs.readFileSync('/tmp/published-transmission.json', 'utf8'));
            const body = [
              `Transmission ${canonized.transmission_id} has been canonized as durable Markdown and published into the visual archive.`,
              ``,
              `Canonical Markdown path: \`${canonized.transmission_path}\``,
              `Public archive path: \`archive/${published.transmission_path}\``,
              `Archive PDF path: \`archive/${published.pdf_path}\``,
              `Portable canon index: \`CANON.md\``,
              ``,
              `This issue now has the \`canonized\` label so the workflow will not duplicate the record.`
            ].join('\n');

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'canonized'
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'canonized',
                  color: '65b7be',
                  description: 'Approved issue has been written as canonical Markdown'
                });
              } else {
                throw error;
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['canonized']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
